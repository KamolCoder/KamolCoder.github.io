<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Street-77</title>
</head>
<body style="">

<div class="container-fluid" >
    <h1 class="text-center mt-5">Ground-Zero Booking</h1>
    <div class="d-grid justify-content-center">
        <form method="post">
            <label for="choose">Выберите комнату :</label>
            <select class="form-control" id="choose" name="choose">
                <option value="Рабочая зона">Рабочая зона</option>
                <option value="Ивент Зона">Ивент Зона</option>
                <option value="Большой митинг рум">Большой митинг рум</option>
                <option value="Малый митинг рум">Малый митинг рум</option>
            </select><br><br>
            <label>На сколько/час:</label>
            <div class="input-group mb-5">
                <div class="input-group-prepend">
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="document.getElementById('numberinput').stepDown()">-
                    </button>
                </div>
                <input type="number" class="form-control mx-3" id="numberinput" name="mynumber" value="0" min="0" max="10"
                       step="1">
                <div class="input-group-append">
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="document.getElementById('numberinput').stepUp()">+
                    </button>
                </div>
            </div>
            <label for="start">Начало :</label>
            <input class="form-control" type="datetime-local" id="start" name="start"><br><br>
            <button class="btn btn-warning" style="width:100%" type="submit">Submit</button>
        </form>
    </div>
</div>


<script src="https://telegram.org/js/telegram-web-app.js"></script>

</body>
</html>
