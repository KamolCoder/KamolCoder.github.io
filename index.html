<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Street-77</title>
</head>
<body>
<div class="container">
    <div class="kolonka-filial">
        <h3>Filial :</h3>
        <div class="polya">
            <button class="btn" id="f1">Kitoblar Olami</button>
            <button class="btn" id="f2">Minor</button>
        </div>
        <div class="polya">
            <button class="btn" id="f3">Sharq</button>
            <button class="btn" id="f4"></button>
        </div>
    </div>
    <div class="kolonka">
        <h3>Rooms :</h3>
        <div class="polya">
            <button class="btn" id="room1">Open Space</button>
            <button class="btn" id="room2">Event-Zone</button>
        </div>
        <div class="polya">
            <button class="btn" id="room3">Big Miting</button>
            <button class="btn" id="room4">Small Miting</button>
        </div>
    </div>
    <div class="kolonka">
        <h3>Duration/hour:</h3>
        <div class="polya">
            <button class="btn" onclick="decrement()">-</button>
            <h5 style="margin:0;padding-left:5rem;padding-right:5rem;font-size:3rem;color:white" id="counter">1</h5>
            <button class="btn" onclick="increment()">+</button>
        </div>
    </div>
    <div class="kolonka">
        <h3 >Booking date / start :</h3>
        <div class="polya">
            <input type="datetime-local" id="input" name="datetime">
        </div>
    </div>
</div>


<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="app.js"></script>

</body>
</html>
