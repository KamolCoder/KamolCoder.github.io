<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Street-77</title>
</head>
<body>
<div class="container">
    <img src="e7e29bfe39c9149a312325412f5f1561.png" style="margin-top:2rem">
    <div class="kolonka">
        <label>Выберите комнату :</label>
        <div class="polya">
            <button class="btn" id="room1">Workspace</button>
            <button class="btn" id="room2">IventZone</button>
        </div>
        <div class="polya">
            <button class="btn" id="room3">BigMiting</button>
            <button class="btn" id="room4">SmallMiting</button>
        </div>
    </div>
    <div class="kolonka">
        <label>На сколько/час:</label>
        <div class="polya">
            <button class="btn" onclick="decrement()">-</button>
            <h5 style="margin:0;padding-left:5rem;padding-right:5rem;font-size:3rem" id="counter">0</h5>
            <button class="btn" onclick="increment()">+</button>
        </div>
    </div>
    <div class="kolonka">
        <label for="start">Выберите дату :</label>
        <div class="polya">
            <input type="datetime-local" id="start" name="start">
        </div>
    </div>
</div>


<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="app.js"></script>

</body>
</html>
